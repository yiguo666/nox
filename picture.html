<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畅览 · 灵感插画空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'SF Pro Display', -apple-system, 'Microsoft YaHei', sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 环境微光 */
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
            top: -200px;
            right: -100px;
            background: #4f46e5;
        }

        header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        header h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 30%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.95rem;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        /* ================= 轮播图区域 (兼顾可玩性与现代感) ================= */
        .carousel-section {
            width: 100%;
            max-width: 850px;
            margin: 0 auto 40px;
            position: relative;
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .carousel-view {
            width: 100%;
            height: 380px;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            z-index: 1;
        }

        .carousel-slide.active {
            opacity: 1;
            z-index: 2;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 轮播图内部的文本浮层 */
        .carousel-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(15, 23, 42, 0.85));
            padding: 25px 20px 15px;
            color: #fff;
            z-index: 3;
        }
        .carousel-caption h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 左右控制按钮 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
            user-select: none;
        }
        .carousel-btn:hover {
            background: rgba(79, 70, 229, 0.8);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-50%) scale(1.05);
        }
        .carousel-prev { left: 25px; }
        .carousel-next { right: 25px; }


        /* ================= 照片墙网格区域 ================= */
        .section-title {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background: #6366f1;
            border-radius: 2px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .image-container {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .image-container:hover {
            transform: translateY(-6px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.35), 0 0 15px rgba(99, 102, 241, 0.15);
        }

        .image-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #151d30;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-container:hover img {
            transform: scale(1.05);
        }

        .image-info {
            padding: 12px 15px;
            background: rgba(15, 23, 42, 0.3);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }

        .image-info p {
            font-size: 0.88rem;
            color: #cbd5e1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 返回主页 */
        .return-button-container {
            text-align: center;
            margin: 30px 0 10px;
        }

        .return-button {
            display: inline-block;
            padding: 10px 28px;
            font-size: 0.9rem;
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .return-button:hover {
            color: #fff;
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        footer {
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            color: #64748b;
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
        }

        /* ================= 全屏大图查看（灯箱）================= */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 8, 16, 0.93);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.3s ease;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-content {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-title {
            color: #94a3b8;
            margin-top: 15px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .modal-close {
            position: absolute;
            top: -45px;
            right: 0;
            color: #94a3b8;
            font-size: 36px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }
        .modal-close:hover { color: #fff; }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .carousel-view { height: 240px; }
            .carousel-btn { width: 36px; height: 36px; font-size: 14px; }
            .carousel-prev { left: 10px; }
            .carousel-next { right: 10px; }
            .image-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .image-wrapper { height: 120px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>畅览 · 空间意象</h1>
        <p>收集视线所及的灵感瞬间</p>
    </header>

    <main>
        <div class="carousel-section">
            <div class="carousel-view" id="carouselView">
                <div class="carousel-slide active" data-index="0">
                    <img src="picture/img1.png" alt="深空幻境 · 序章">
                    <div class="carousel-caption"><h3>深空幻境 · 序章</h3></div>
                </div>
                <div class="carousel-slide" data-index="1">
                    <img src="picture/img2.png" alt="冰雪陆地之眼">
                    <div class="carousel-caption"><h3>瑞克莫蒂.幻想</h3></div>
                </div>
                <div class="carousel-slide" data-index="2">
                    <img src="picture/img3.jpg" alt="机械律动概念">
                    <div class="carousel-caption"><h3>机械律动概念</h3></div>
                </div>
                <div class="carousel-slide" data-index="3">
                    <img src="picture/img4.jpg" alt="永夜长巷的微光">
                    <div class="carousel-caption"><h3>永夜长巷的微光</h3></div>
                </div>
                <div class="carousel-slide" data-index="4">
                    <img src="picture/img5.jpg" alt="代码涌流之夜">
                    <div class="carousel-caption"><h3>代码涌流之夜</h3></div>
                </div>
                <div class="carousel-slide" data-index="5">
                    <img src="picture/img6.png" alt="潮汐交界隔离区">
                    <div class="carousel-caption"><h3>潮汐交界隔离区</h3></div>
                </div>
                <div class="carousel-slide" data-index="6">
                    <img src="picture/img7.jpg" alt="未明纪元遗迹">
                    <div class="carousel-caption"><h3>未明纪元遗迹</h3></div>
                </div>
                <div class="carousel-slide" data-index="7">
                    <img src="picture/img8.jpg" alt="终焉回响之诗">
                    <div class="carousel-caption"><h3>终焉回响之诗</h3></div>
                </div>
            </div>
            <div class="carousel-btn carousel-prev" onclick="changeSlide(-1)">&#10094;</div>
            <div class="carousel-btn carousel-next" onclick="changeSlide(1)">&#10095;</div>
        </div>

        <div class="section-title">画廊总览</div>

        <div class="image-grid">
            <div class="image-container" onclick="openModal('picture/img1.png', '深空幻境 · 序章')">
                <div class="image-wrapper"><img src="picture/img1.png" alt="img1"></div>
                <div class="image-info"><p>深空幻境 · 序章</p></div>
            </div>
            <div class="image-container" onclick="openModal('picture/img2.png', '冰雪陆地之眼')">
                <div class="image-wrapper"><img src="picture/img2.png" alt="img2"></div>
                <div class="image-info"><p>瑞克莫蒂.幻想</p></div>
            </div>
            <div class="image-container" onclick="openModal('picture/img3.jpg', '机械律动概念')">
                <div class="image-wrapper"><img src="picture/img3.jpg" alt="img3"></div>
                <div class="image-info"><p>机械律动概念</p></div>
            </div>
            <div class="image-container" onclick="openModal('picture/img4.jpg', '永夜长巷的微光')">
                <div class="image-wrapper"><img src="picture/img4.jpg" alt="img4"></div>
                <div class="image-info"><p>永夜长巷的微光</p></div>
            </div>
            <div class="image-container" onclick="openModal('picture/img5.jpg', '代码涌流之夜')">
                <div class="image-wrapper"><img src="picture/img5.jpg" alt="img5"></div>
                <div class="image-info"><p>代码涌流之夜</p></div>
            </div>
            <div class="image-container" onclick="openModal('picture/img6.png', '潮汐交界隔离区')">
                <div class="image-wrapper"><img src="picture/img6.png" alt="img6"></div>
                <div class="image-info"><p>潮汐交界隔离区</p></div>
            </div>
            <div class="image-container" onclick="openModal('picture/img7.jpg', '未明纪元遗迹')">
                <div class="image-wrapper"><img src="picture/img7.jpg" alt="img7"></div>
                <div class="image-info"><p>未明纪元遗迹</p></div>
            </div>
            <div class="image-container" onclick="openModal('picture/img8.jpg', '终焉回响之诗')">
                <div class="image-wrapper"><img src="picture/img8.jpg" alt="img8"></div>
                <div class="image-info"><p>终焉回响之诗</p></div>
            </div>
        </div>

        <div class="return-button-container">
            <a href="index.html" class="return-button">← 返回主页世界</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Dream Image Universe. Studio Edition.</p>
    </footer>

    <div id="myModal" class="modal" onclick="closeModal()">
        <div class="modal-wrapper" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modalImage" class="modal-content" src="" alt="">
            <div id="modalTitle" class="modal-title"></div>
        </div>
    </div>

    <script>
        // ================= 轮播图逻辑 =================
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        let timer = null;

        function showSlide(index) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (index + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        function changeSlide(n) {
            clearInterval(timer); // 用户手动干预时清空定时器
            showSlide(currentSlide + n);
            startAutoPlay(); // 重新启动自动播放
        }

        function startAutoPlay() {
            timer = setInterval(() => {
                showSlide(currentSlide + 1);
            }, 3500); // 每 3.5 秒切换一次
        }

        // 初始化自动轮播
        startAutoPlay();

        // 点击轮播图也可以放大查看
        document.getElementById('carouselView').addEventListener('click', () => {
            const activeSlide = slides[currentSlide];
            const img = activeSlide.querySelector('img');
            openModal(img.src, img.alt);
        });


        // ================= 灯箱（放大查看）逻辑 =================
        function openModal(imageSrc, titleText) {
            const modal = document.getElementById("myModal");
            const modalImg = document.getElementById("modalImage");
            const modalTitle = document.getElementById("modalTitle");
            
            modalImg.src = imageSrc;
            modalTitle.innerText = titleText;
            modal.style.display = "flex";
            
            setTimeout(() => {
                modal.classList.add("show");
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById("myModal");
            modal.classList.remove("show");
            setTimeout(() => {
                modal.style.display = "none";
            }, 300);
        }

        // ESC 按键支持
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
